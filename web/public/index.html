<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Configure Quickstart</title>
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0b0d12; color: #e9edf3; font-family: ui-sans-serif, -apple-system, "Segoe UI", sans-serif; }
      main { text-align: center; padding: 40px; max-width: 460px; }
      .mark { height: 36px; opacity: 0.95; margin-bottom: 26px; }
      h1 { font-size: 24px; margin: 0 0 10px; font-weight: 600; letter-spacing: -0.01em; }
      p { color: #9aa4b2; line-height: 1.55; margin: 0 0 30px; }
      .demo { display: inline-flex; align-items: center; gap: 9px; background: #5b54e6; color: #fff; text-decoration: none; font-weight: 600; font-size: 15px; padding: 13px 22px; border-radius: 11px; transition: transform 0.12s ease, filter 0.12s ease; }
      .demo:hover { transform: translateY(-1px); filter: brightness(1.08); }
      .or { margin: 22px 0 14px; font-size: 12.5px; color: #5f6b7a; }
      a.btn { display: inline-block; transition: transform 0.12s ease, filter 0.12s ease; }
      a.btn:hover { transform: translateY(-1px); filter: brightness(1.06); }
      a.btn img { height: 44px; }
      .hint { margin-top: 26px; font-size: 13px; color: #5f6b7a; }
      code { background: #161a22; border: 1px solid #232a36; border-radius: 6px; padding: 2px 6px; color: #c6cfdb; }
    </style>
  </head>
  <body>
    <main>
      <img class="mark" src="/configure-brandmark-white.svg" alt="Configure" />
      <h1>Sign in with Configure</h1>
      <p>
        The user verifies their phone and grants consent on Configure’s hosted
        page. You get a token and read their profile — no password, no OTP code,
        no OAuth plumbing.
      </p>
      <a class="demo" href="/demo">▶&nbsp; Watch the demo</a>
      <div class="or">or run the real flow</div>
      <a class="btn" href="/login">
        <img src="/continue-with-configure.svg" alt="Continue with Configure" />
      </a>
      <div class="hint">Powered by <code>configure</code></div>
    </main>
  </body>
</html>
