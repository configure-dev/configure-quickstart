<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Configure Quickstart</title>
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0b0d12; color: #e9edf3; font-family: ui-sans-serif, -apple-system, "Segoe UI", sans-serif; }
      main { text-align: center; padding: 40px; max-width: 440px; }
      .mark { height: 38px; opacity: 0.95; margin-bottom: 28px; }
      h1 { font-size: 24px; margin: 0 0 10px; font-weight: 600; letter-spacing: -0.01em; }
      p { color: #9aa4b2; line-height: 1.55; margin: 0 0 32px; }
      a.btn { display: inline-block; transition: transform 0.12s ease, filter 0.12s ease; }
      a.btn:hover { transform: translateY(-1px); filter: brightness(1.06); }
      a.btn img { height: 48px; }
      .hint { margin-top: 28px; font-size: 13px; color: #5f6b7a; }
      code { background: #161a22; border: 1px solid #232a36; border-radius: 6px; padding: 2px 6px; color: #c6cfdb; }
    </style>
  </head>
  <body>
    <main>
      <img class="mark" src="/configure-brandmark-white.svg" alt="Configure" />
      <h1>Sign in to the demo</h1>
      <p>
        Sign in with Configure. You’ll verify your phone and consent on Configure’s
        hosted page, then land back here — and the app will know who you are.
      </p>
      <a class="btn" href="/login">
        <img src="/continue-with-configure.svg" alt="Continue with Configure" />
      </a>
      <div class="hint">Powered by <code>configure</code></div>
    </main>
  </body>
</html>
