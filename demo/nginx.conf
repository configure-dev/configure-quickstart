server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # The demo IS the front door. `/` and `/demo` both serve it, so the same URL
  # works for anything: demo.configure.dev/?source=github, .../demo?return_to=...
  location = /        { try_files /demo.html =404; }
  location = /demo    { try_files /demo.html =404; }

  location / { try_files $uri $uri/ =404; }

  # long-cache the static brand assets + logos
  location ~* \.(svg|png|jpg|jpeg|webp|ico|css|js)$ {
    expires 7d;
    add_header Cache-Control "public";
  }
}
